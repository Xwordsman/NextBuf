services:
  web:
    image: ${NEXTBUF_IMAGE:-nextbuf:local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      DEPLOYMENT_VERSION: ${DEPLOYMENT_VERSION:-local}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://nextbuf:nextbuf-change-me@postgres:5432/nextbuf}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: 3000
    ports:
      - "${WEB_PORT:-3050}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextbuf}
      POSTGRES_USER: ${POSTGRES_USER:-nextbuf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextbuf-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextbuf} -d ${POSTGRES_DB:-nextbuf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
  redis_data:
